<title>Lord Hill — Digital Card</title>
<style>
  :root {
    --ink: #12100e; --ink-soft: #1d1a17; --paper: #f6f2ea;
    --gold: #c9a24b; --gold-bright: #e0be6a; --muted: #8a8378;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--ink); }
  body {
    min-height: 100vh; color: var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 28px 20px;
    background: radial-gradient(ellipse 90% 55% at 50% 0%, rgba(201,162,75,0.13), transparent), var(--ink);
  }
  .card {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 0;
  }
  .frame {
    border: 1px solid rgba(201,162,75,0.4); border-radius: 4px;
    padding: 36px 24px 32px; width: 100%;
    display: flex; flex-direction: column; align-items: center;
  }
  .name { font-family: Georgia, 'Times New Roman', serif; font-size: 2rem; letter-spacing: 0.08em; }
  .name span { color: var(--gold-bright); }
  .divider { width: 52px; height: 1px; background: var(--gold); margin: 14px 0 12px; }
  .role { font-size: 0.7rem; letter-spacing: 0.34em; text-transform: uppercase; color: var(--muted); }
  .qr-panel {
    background: #fff; border-radius: 14px; padding: 18px;
    margin: 28px 0 14px; line-height: 0;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  }
  .qr-panel img { width: min(62vw, 264px); height: auto; }
  .hint { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 26px; }
  .actions { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .btn {
    display: block; width: 100%; padding: 15px 20px; border-radius: 3px;
    text-decoration: none; font-weight: 600; font-size: 0.85rem;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .btn-gold { background: var(--gold); color: var(--ink); }
  .btn-line { border: 1px solid rgba(246,242,234,0.3); color: var(--paper); }
  .btn:active { opacity: 0.85; }
  .tagline {
    margin-top: 26px; font-family: Georgia, serif; font-style: italic;
    font-size: 0.95rem; color: var(--muted); max-width: 30ch;
  }
</style>
