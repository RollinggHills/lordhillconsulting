<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lord Hill Consulting — Business Card (Print)</title>
<style>
  /* Standard US business card: 3.5in x 2in.
     Print via File > Print > Save as PDF, 100% scale, margins: none.
     Most print services (Vistaprint/Moo) also accept this PDF directly. */
  :root {
    --ink: #12100e;
    --paper: #f6f2ea;
    --gold: #c9a24b;
    --gold-bright: #e0be6a;
    --muted: #8a8378;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2723;
    font-family: var(--sans);
    display: flex; flex-direction: column; align-items: center;
    gap: 40px; padding: 60px 20px;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .label {
    color: #8a8378; font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: -28px;
  }
  .card {
    width: 3.5in; height: 2in;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  /* ---------- FRONT ---------- */
  .front {
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }
  .front::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,162,75,0.14), transparent);
  }
  .front .frame {
    position: absolute; inset: 10px;
    border: 1px solid rgba(201,162,75,0.4);
    border-radius: 3px; pointer-events: none;
  }
  .front .name {
    font-family: var(--serif);
    font-size: 22pt; letter-spacing: 0.08em;
    color: var(--paper); position: relative;
  }
  .front .name span { color: var(--gold-bright); }
  .front .divider {
    width: 44px; height: 1px; background: var(--gold);
    margin: 10px auto 9px; position: relative;
  }
  .front .role {
    font-size: 6.5pt; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--muted); position: relative;
  }

  /* ---------- BACK ---------- */
  .back {
    background: var(--paper);
    color: var(--ink);
    display: flex;
  }
  .back .left {
    flex: 1;
    padding: 0.22in 0 0.22in 0.28in;
    display: flex; flex-direction: column; justify-content: center;
  }
  .back .person {
    font-family: var(--serif); font-size: 12.5pt; letter-spacing: 0.03em;
  }
  .back .title {
    font-size: 6pt; letter-spacing: 0.26em; text-transform: uppercase;
    color: #a07c2e; margin: 4px 0 12px; font-weight: 700;
  }
  .back .contact { font-size: 7.5pt; color: #3d382f; line-height: 1.9; }
  .back .contact strong { letter-spacing: 0.04em; }
  .back .tagline {
    margin-top: 12px; font-family: var(--serif); font-style: italic;
    font-size: 7.5pt; color: #8a8378;
  }
  .back .right {
    width: 0.95in;
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
  }
  .back .mono {
    font-family: var(--serif); font-size: 16pt; color: var(--gold-bright);
    letter-spacing: 0.05em;
  }
  .back .flat {
    font-size: 5pt; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); text-align: center; line-height: 1.8;
  }

  /* ---------- Print ---------- */
  @page { size: 3.7in 2.2in; margin: 0; }
  @media print {
    body { background: none; padding: 0; gap: 0; display: block; }
    .label { display: none; }
    .card {
      box-shadow: none; border-radius: 0;
      margin: 0.1in auto;
      page-break-after: always;
    }
  }
</style>
</head>
<body>

<div class="label">Front</div>
<div class="card front">
  <div class="frame"></div>
  <div class="name">LORD <span>HILL</span></div>
  <div class="divider"></div>
  <div class="role">Consulting</div>
</div>

<div class="label">Back</div>
<div class="card back">
  <div class="left">
    <div class="person">Matthew Hill Jr.</div>
    <div class="title">Founder · Creative Consultant</div>
    <div class="contact">
      <strong>matthewhilljr56@gmail.com</strong><br>
      lordhillconsulting.com
    </div>
    <div class="tagline">See the potential your business can't see yet.</div>
  </div>
  <div class="right">
    <div class="mono">LH</div>
    <div class="flat">Flat Rates ·<br>Real Outcomes</div>
  </div>
</div>

</body>
</html>
