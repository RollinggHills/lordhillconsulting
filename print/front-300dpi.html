<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>front bleed 300dpi</title>
<style>
  /* 3.75in x 2.25in at 300dpi = 1125 x 675 px (0.125in bleed each side; trim = 3.5x2) */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1125px; height: 675px; overflow: hidden; }
  body {
    background: #12100e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,162,75,0.14), transparent);
  }
  .frame {
    position: absolute; inset: 74px;
    border: 3px solid rgba(201,162,75,0.45);
  }
  .name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 92px; letter-spacing: 0.08em;
    color: #f6f2ea; position: relative;
  }
  .name span { color: #e0be6a; }
  .divider { width: 180px; height: 3px; background: #c9a24b; margin: 27px auto 24px; position: relative; }
  .role { font-size: 27px; letter-spacing: 0.34em; text-transform: uppercase; color: #8a8378; position: relative; }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="name">LORD <span>HILL</span></div>
  <div class="divider"></div>
  <div class="role">Consulting</div>
</body>
</html>
