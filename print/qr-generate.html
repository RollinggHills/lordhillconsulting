<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lord Hill — vCard QR generator</title>
<script src="qrcode.min.js"></script>
<style>
  body {
    background: #12100e; color: #f6f2ea; min-height: 100vh; margin: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    gap: 24px; padding: 40px;
  }
  .brand { font-family: Georgia, serif; font-size: 1.6rem; letter-spacing: 0.08em; }
  .brand span { color: #e0be6a; }
  .qr-box { background: #fff; padding: 24px; border-radius: 12px; }
  .qr-box #qr-preview img, .qr-box #qr-preview canvas { display: block; }
  .hint { color: #8a8378; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; }
  #status { color: #e0be6a; font-size: 0.85rem; }
  #qr-hires { position: absolute; left: -99999px; top: 0; }
</style>
</head>
<body>
  <div class="brand">LORD <span>HILL</span> CONSULTING</div>
  <div class="qr-box"><div id="qr-preview"></div></div>
  <div class="hint">Scan to save my contact</div>
  <div id="status">generating…</div>
  <div id="qr-hires"></div>
<script>
  var VCARD = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Hill;Matthew;;;Jr.',
    'FN:Matthew Hill Jr.',
    'ORG:Lord Hill Consulting',
    'TITLE:Founder & Creative Consultant',
    'EMAIL;TYPE=INTERNET:matthewhilljr56@gmail.com',
    'URL:https://lordhillconsulting.com',
    'NOTE:Flat-rate creative consulting - see the potential your business can\'t see yet.',
    'END:VCARD'
  ].join('\n');

  window.QR_DATA = null;
  try {
    new QRCode(document.getElementById('qr-preview'), {
      text: VCARD, width: 320, height: 320,
      colorDark: '#12100e', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    new QRCode(document.getElementById('qr-hires'), {
      text: VCARD, width: 1200, height: 1200,
      colorDark: '#12100e', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(function () {
      var canvas = document.querySelector('#qr-hires canvas');
      window.QR_DATA = canvas ? canvas.toDataURL('image/png') : null;
      document.getElementById('status').textContent = window.QR_DATA ? 'ready · hi-res ready' : 'hi-res canvas missing';
    }, 300);
  } catch (e) {
    document.getElementById('status').textContent = 'ERROR: ' + e.message;
  }
</script>
</body>
</html>
