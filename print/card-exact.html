<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lord Hill Consulting — Card 3.5x2 exact</title>
<style>
  /* Exact trim size: 3.5in x 2in. Page 1 = front, page 2 = back. */
  @page { size: 3.5in 2in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  :root {
    --ink: #12100e;
    --paper: #f6f2ea;
    --gold: #c9a24b;
    --gold-bright: #e0be6a;
    --muted: #8a8378;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  .card {
    width: 3.5in; height: 2in;
    position: relative; overflow: hidden;
    font-family: var(--sans);
    page-break-after: always;
  }
  .card:last-child { page-break-after: avoid; }

  .front {
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .front::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,162,75,0.14), transparent);
  }
  .front .frame {
    position: absolute; inset: 0.12in;
    border: 1px solid rgba(201,162,75,0.45);
  }
  .front .name {
    font-family: var(--serif); font-size: 22pt; letter-spacing: 0.08em;
    color: var(--paper); position: relative;
  }
  .front .name span { color: var(--gold-bright); }
  .front .divider { width: 0.6in; height: 1px; background: var(--gold); margin: 0.09in auto 0.08in; position: relative; }
  .front .role { font-size: 6.5pt; letter-spacing: 0.34em; text-transform: uppercase; color: var(--muted); position: relative; }

  .back { background: var(--paper); color: var(--ink); display: flex; }
  .back .left {
    flex: 1; padding: 0.22in 0 0.22in 0.28in;
    display: flex; flex-direction: column; justify-content: center;
  }
  .back .person { font-family: var(--serif); font-size: 12.5pt; letter-spacing: 0.03em; }
  .back .title { font-size: 6pt; letter-spacing: 0.26em; text-transform: uppercase; color: #a07c2e; margin: 4pt 0 10pt; font-weight: 700; }
  .back .contact { font-size: 7.5pt; color: #3d382f; line-height: 1.9; }
  .back .contact strong { letter-spacing: 0.04em; }
  .back .tagline { margin-top: 10pt; font-family: var(--serif); font-style: italic; font-size: 7.5pt; color: #8a8378; }
  .back .right {
    width: 0.95in; background: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5pt;
  }
  .back .mono { font-family: var(--serif); font-size: 16pt; color: var(--gold-bright); letter-spacing: 0.05em; }
  .back .flat { font-size: 5pt; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); text-align: center; line-height: 1.8; }
</style>
</head>
<body>

<div class="card front">
  <div class="frame"></div>
  <div class="name">LORD <span>HILL</span></div>
  <div class="divider"></div>
  <div class="role">Consulting</div>
</div>

<div class="card back">
  <div class="left">
    <div class="person">Matthew Hill Jr.</div>
    <div class="title">Founder · Creative Consultant</div>
    <div class="contact">
      <strong>matthewhilljr56@gmail.com</strong><br>
      lordhillconsulting.com
    </div>
    <div class="tagline">See the potential your business can't see yet.</div>
  </div>
  <div class="right">
    <div class="mono">LH</div>
    <div class="flat">Flat Rates ·<br>Real Outcomes</div>
  </div>
</div>

</body>
</html>
